<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Telegram Bot - Pengecek Data</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 1rem; }
        input, button { width: 100%; padding: 0.7rem; margin: 0.5rem 0; border-radius: 0.5rem; border: none; font-size: 1rem; }
        input { background: #0f172a; color: white; }
        button { background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .result { background: #0f172a; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; white-space: pre-wrap; font-family: monospace; }
        .warning { background: #7f1d1d; padding: 0.7rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>📨 Kirim Perintah ke Bot Telegram</h2>
    <div class="warning">
        ⚠️ Token Bot dan Chat ID Anda tersimpan di halaman ini. Jangan bagikan file ini ke siapa pun.
    </div>
    <input type="text" id="botToken" value="7529338395:AAEqq_w4gc065JYKGwJw_aCkE086YAG2Rts" readonly>
    <input type="text" id="chatId" value="7615971800" placeholder="Chat ID Telegram Anda">
    <input type="text" id="command" placeholder="Contoh: /nama arya sinulingga" value="/nama ">
    <button onclick="sendCommand()">Kirim Perintah ke Bot</button>
    <div class="result" id="resultArea">💬 Hasil dari bot akan muncul di sini...</div>
</div>

<script>
    async function sendCommand() {
        const token = document.getElementById('botToken').value;
        const chatId = document.getElementById('chatId').value;
        const command = document.getElementById('command').value;
        const resultDiv = document.getElementById('resultArea');
        
        if (!chatId || !command) {
            resultDiv.innerHTML = "⚠️ Chat ID dan perintah harus diisi!";
            return;
        }
        
        resultDiv.innerHTML = "⏳ Mengirim perintah...";
        
        try {
            // Kirim perintah sebagai pesan biasa ke bot
            const sendUrl = `https://api.telegram.org/bot${token}/sendMessage`;
            const response = await fetch(sendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: command, parse_mode: 'Markdown' })
            });
            const data = await response.json();
            
            if (data.ok) {
                resultDiv.innerHTML = "✅ Perintah terkirim! Cek chat bot Telegram Anda untuk hasilnya.";
            } else {
                resultDiv.innerHTML = `❌ Gagal: ${data.description}`;
            }
        } catch (error) {
            resultDiv.innerHTML = `❌ Error: ${error.message}`;
        }
    }
</script>
</body>
</html>
